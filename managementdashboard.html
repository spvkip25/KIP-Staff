<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Management Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --dock-bottom: max(18px, env(safe-area-inset-bottom));
    }

    * {
      -webkit-tap-highlight-color: transparent;
      transition:
        background-color 420ms ease,
        color 420ms ease,
        border-color 420ms ease,
        box-shadow 420ms ease,
        opacity 260ms ease;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .fade-in { animation: fadeIn 0.45s ease both; }
    .slide-up { animation: slideUp 0.5s ease both; }
    .dock-pop { animation: dockPop 0.45s cubic-bezier(.2,.9,.2,1.2) both; }
    .modal-pop { animation: modalPop 0.28s cubic-bezier(.2,.9,.2,1.1) both; }
    .toast-in { animation: toastIn 0.32s ease both; }
    .theme-switching { pointer-events: none; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes dockPop {
      from { opacity: 0; transform: translateY(20px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes modalPop {
      from { opacity: 0; transform: translateY(18px) scale(.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(14px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    input, select { color-scheme: light; }
    .dark input, .dark select { color-scheme: dark; }

    .glass-light {
      background: rgba(255,255,255,.74);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .glass-dark {
      background: rgba(15,23,42,.74);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .dock-glass-light {
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
    }

    .dock-glass-dark {
      background: rgba(15,23,42,.80);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
    }

    .custom-scroll::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, .45);
      border-radius: 999px;
    }

    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, .7);
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      .fade-in,
      .slide-up,
      .dock-pop,
      .modal-pop,
      .toast-in {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useState } = React;

    /***********************
     * GITHUB FRONTEND CONFIG
     ***********************/
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyklRwZ2w1uUTBBHCypsZnSmLexi-9TBLHr6EmtmE3v0ffJtOZVdEJVUpK4VJQAyzO9/exec';

    const SESSION_KEY = 'gas_auth_token';
    const THEME_KEY = 'management_dashboard_theme';

    const MONTH_NAMES = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];

    const ROLE_OPTIONS = [
      { value: 'Admin', label: 'Admin' },
      { value: 'Team Leader', label: 'Team Leader' },
      { value: 'Management', label: 'Management' },
    ];

    const STATUS_OPTIONS = [
      { value: 'Active', label: 'Active' },
      { value: 'Inactive', label: 'Inactive' },
    ];

    async function runGas(action, ...params) {
      if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL === 'PASTE_YOUR_GAS_WEB_APP_URL_HERE') {
        throw new Error('GAS_WEB_APP_URL belum diatur.');
      }

      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({
          action,
          params,
        }),
      });

      const text = await response.text();

      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error('Response server bukan JSON valid.');
      }
    }

    function App() {
      const today = new Date();

      const [theme, setTheme] = useState(localStorage.getItem(THEME_KEY) || 'dark');
      const [activeMenu, setActiveMenu] = useState('dashboard');

      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);

      const [toast, setToast] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);

      const [branches, setBranches] = useState([]);

      const [filters, setFilters] = useState({
        branch: '',
        date: '',
        month: today.getMonth() + 1,
        year: today.getFullYear(),
      });

      const [overview, setOverview] = useState(null);
      const [students, setStudents] = useState([]);
      const [supplies, setSupplies] = useState([]);
      const [authUsers, setAuthUsers] = useState([]);

      const [authForm, setAuthForm] = useState({
        originalUsername: '',
        username: '',
        password: '',
        role: 'Admin',
        branch: '',
        status: 'Active',
      });

      const [accessError, setAccessError] = useState('');
      const isDark = theme === 'dark';

      useEffect(() => {
        document.documentElement.classList.toggle('dark', isDark);
        localStorage.setItem(THEME_KEY, theme);
      }, [theme]);

      useEffect(() => {
        boot();
      }, []);

      function smoothToggleTheme() {
        document.body.classList.add('theme-switching');

        setTheme(prev => prev === 'dark' ? 'light' : 'dark');

        setTimeout(() => {
          document.body.classList.remove('theme-switching');
        }, 450);
      }

      function showToast(type, text) {
        setToast({ type, text });

        setTimeout(() => {
          setToast(null);
        }, 3400);
      }

      function showSuccess(text) {
        showToast('success', text);
      }

      function showError(text) {
        showToast('error', text);
      }

      function openConfirm(config) {
        setConfirmDialog({
          title: config.title || 'Are you sure?',
          message: config.message || 'This action needs confirmation.',
          confirmText: config.confirmText || 'Confirm',
          cancelText: config.cancelText || 'Cancel',
          tone: config.tone || 'danger',
          onConfirm: config.onConfirm,
        });
      }

      function closeConfirm() {
        setConfirmDialog(null);
      }

      function redirectToLogin() {
        window.location.href = 'index.html';
      }

      async function boot() {
        setLoading(true);
        setAccessError('');

        try {
          const token = localStorage.getItem(SESSION_KEY);

          if (!token) {
            redirectToLogin();
            return;
          }

          const sessionResponse = await runGas('getUserSession', token);

          if (!sessionResponse.success) {
            localStorage.removeItem(SESSION_KEY);
            redirectToLogin();
            return;
          }

          if (sessionResponse.user.role !== 'Management') {
            setAccessError('Akses ditolak. Halaman ini hanya untuk Management.');
            setLoading(false);
            return;
          }

          setUser(sessionResponse.user);

          await Promise.all([
            loadBranches(token),
            loadOverview(token, filters),
            loadStudents(token, filters),
            loadSupplies(token, filters),
            loadAuthUsers(token),
          ]);

        } catch (err) {
          setAccessError(err.message || 'Gagal memuat Management Dashboard.');
        } finally {
          setLoading(false);
        }
      }

      async function loadBranches(tokenParam) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getManagementBranches', token);

        if (response.success) {
          setBranches(response.data || []);
        } else {
          showError(response.message || 'Gagal memuat branch.');
        }
      }

      async function loadOverview(tokenParam, customFilters) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getManagementOverview', token, customFilters || filters);

        if (response.success) {
          setOverview(response.data);
        } else {
          showError(response.message || 'Gagal memuat overview.');
        }
      }

      async function loadStudents(tokenParam, customFilters) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getManagementStudents', token, customFilters || filters);

        if (response.success) {
          setStudents(response.data || []);
        } else {
          showError(response.message || 'Gagal memuat students.');
        }
      }

      async function loadSupplies(tokenParam, customFilters) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getManagementSupplies', token, customFilters || filters);

        if (response.success) {
          setSupplies(response.data || []);
        } else {
          showError(response.message || 'Gagal memuat supplies.');
        }
      }

      async function loadAuthUsers(tokenParam) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getAuthUsers', token);

        if (response.success) {
          setAuthUsers(response.data || []);
        } else {
          showError(response.message || 'Gagal memuat auth users.');
        }
      }

      async function applyFilters() {
        setSaving(true);

        try {
          const token = localStorage.getItem(SESSION_KEY);

          await Promise.all([
            loadOverview(token, filters),
            loadStudents(token, filters),
            loadSupplies(token, filters),
          ]);

          showSuccess('Filter berhasil diterapkan.');

        } catch (err) {
          showError(err.message || 'Gagal menerapkan filter.');
        } finally {
          setSaving(false);
        }
      }

      async function clearFilters() {
        const empty = {
          branch: '',
          date: '',
          month: today.getMonth() + 1,
          year: today.getFullYear(),
        };

        setFilters(empty);

        setSaving(true);

        try {
          const token = localStorage.getItem(SESSION_KEY);

          await Promise.all([
            loadOverview(token, empty),
            loadStudents(token, empty),
            loadSupplies(token, empty),
          ]);

          showSuccess('Filter dikembalikan ke default.');

        } catch (err) {
          showError(err.message || 'Gagal clear filter.');
        } finally {
          setSaving(false);
        }
      }

      function resetAuthForm() {
        setAuthForm({
          originalUsername: '',
          username: '',
          password: '',
          role: 'Admin',
          branch: '',
          status: 'Active',
        });
      }

      function editAuthUser(item) {
        setAuthForm({
          originalUsername: item.Username,
          username: item.Username,
          password: item.Password,
          role: item.Role,
          branch: item.Branch,
          status: item.Status || 'Active',
        });

        setActiveMenu('auth');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      async function submitAuthUser(e) {
        e.preventDefault();

        if (!authForm.username || !authForm.role || !authForm.status) {
          showError('Username, Role, dan Status wajib diisi.');
          return;
        }

        if (!authForm.originalUsername && !authForm.password) {
          showError('Password wajib diisi untuk user baru.');
          return;
        }

        if ((authForm.role === 'Admin' || authForm.role === 'Team Leader') && !authForm.branch) {
          showError('Branch wajib untuk Admin dan Team Leader.');
          return;
        }

        setSaving(true);

        try {
          const token = localStorage.getItem(SESSION_KEY);

          const payload = {
            username: authForm.username,
            password: authForm.password,
            role: authForm.role,
            branch: authForm.branch,
            status: authForm.status,
          };

          const response = authForm.originalUsername
            ? await runGas('updateAuthUser', token, authForm.originalUsername, payload)
            : await runGas('createAuthUser', token, payload);

          if (!response.success) {
            showError(response.message || 'Gagal menyimpan auth user.');
            return;
          }

          resetAuthForm();

          await Promise.all([
            loadAuthUsers(token),
            loadOverview(token, filters),
            loadBranches(token),
          ]);

          showSuccess(response.message || 'Auth user berhasil disimpan.');

        } catch (err) {
          showError(err.message || 'Terjadi error saat menyimpan auth user.');
        } finally {
          setSaving(false);
        }
      }

      function requestDeleteAuthUser(username) {
        openConfirm({
          title: 'Delete auth user?',
          message: 'User ini akan dihapus dari sheet Auth. Aksi ini tidak bisa dibatalkan.',
          confirmText: 'Delete',
          tone: 'danger',
          onConfirm: () => deleteAuthUserNow(username),
        });
      }

      async function deleteAuthUserNow(username) {
        closeConfirm();
        setSaving(true);

        try {
          const token = localStorage.getItem(SESSION_KEY);
          const response = await runGas('deleteAuthUser', token, username);

          if (!response.success) {
            showError(response.message || 'Gagal menghapus auth user.');
            return;
          }

          await Promise.all([
            loadAuthUsers(token),
            loadOverview(token, filters),
            loadBranches(token),
          ]);

          showSuccess(response.message || 'Auth user berhasil dihapus.');

        } catch (err) {
          showError(err.message || 'Terjadi error saat menghapus auth user.');
        } finally {
          setSaving(false);
        }
      }

      function requestLogout() {
        openConfirm({
          title: 'Logout from dashboard?',
          message: 'Session kamu akan diakhiri dan kamu akan kembali ke halaman login.',
          confirmText: 'Logout',
          tone: 'neutral',
          onConfirm: handleLogout,
        });
      }

      async function handleLogout() {
        closeConfirm();

        try {
          const token = localStorage.getItem(SESSION_KEY);
          await runGas('logoutUser', token);
        } catch (err) {
          console.error(err);
        } finally {
          localStorage.removeItem(SESSION_KEY);
          redirectToLogin();
        }
      }

      const summary = overview?.summary || {};
      const dailyTotals = overview?.dailyTotals || [];
      const branchSummary = overview?.branchSummary || [];

      const pageClass = isDark
        ? 'dark min-h-screen bg-[#020617] text-white'
        : 'min-h-screen bg-slate-100 text-slate-950';

      if (loading) {
        return (
          <div className={pageClass}>
            <div className="min-h-screen flex items-center justify-center px-4">
              <div className="text-center fade-in">
                <div className={`w-12 h-12 border-4 rounded-full animate-spin mx-auto mb-4 ${
                  isDark ? 'border-white/20 border-t-white' : 'border-slate-300 border-t-slate-950'
                }`}></div>
                <p className={isDark ? 'text-white/70 text-sm' : 'text-slate-500 text-sm'}>
                  Loading Management Dashboard...
                </p>
              </div>
            </div>
          </div>
        );
      }

      if (accessError && !user) {
        return (
          <div className={pageClass}>
            <div className="min-h-screen flex items-center justify-center px-4">
              <div className={cardClass(isDark) + ' max-w-md w-full rounded-3xl p-6 text-center'}>
                <h1 className="text-xl font-black mb-2">Access Error</h1>
                <p className="text-red-500 text-sm mb-5">{accessError}</p>
                <button onClick={handleLogout} className={primaryButtonClass(isDark)}>
                  Back to Login
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className={pageClass}>
          <BackgroundGlow isDark={isDark} />

          <div className="relative min-h-screen pb-32">
            <Header
              user={user}
              isDark={isDark}
              theme={theme}
              onToggleTheme={smoothToggleTheme}
              onLogout={requestLogout}
            />

            <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
              <section className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6 slide-up">
                <StatCard isDark={isDark} label="Students Hadir" value={summary.totalStudents || 0} icon="users" />
                <StatCard isDark={isDark} label="Paper Used" value={summary.totalPaper || 0} icon="paper" />
                <StatCard isDark={isDark} label="Printing Used" value={summary.totalPrinting || 0} icon="printer" />
                <StatCard isDark={isDark} label="Active Users" value={summary.activeUsers || 0} icon="user" />
              </section>

              <FiltersPanel
                isDark={isDark}
                filters={filters}
                setFilters={setFilters}
                branches={branches}
                onApply={applyFilters}
                onClear={clearFilters}
                saving={saving}
              />

              {activeMenu === 'dashboard' && (
                <DashboardView
                  isDark={isDark}
                  overview={overview}
                  dailyTotals={dailyTotals}
                  branchSummary={branchSummary}
                  filters={filters}
                />
              )}

              {activeMenu === 'students' && (
                <StudentsView
                  isDark={isDark}
                  students={students}
                />
              )}

              {activeMenu === 'supplies' && (
                <SuppliesView
                  isDark={isDark}
                  supplies={supplies}
                />
              )}

              {activeMenu === 'auth' && (
                <AuthUsersView
                  isDark={isDark}
                  authUsers={authUsers}
                  authForm={authForm}
                  setAuthForm={setAuthForm}
                  branches={branches}
                  saving={saving}
                  onSubmit={submitAuthUser}
                  onReset={resetAuthForm}
                  onEdit={editAuthUser}
                  onDelete={requestDeleteAuthUser}
                />
              )}

              {activeMenu === 'profile' && (
                <ProfileView isDark={isDark} user={user} />
              )}
            </main>

            <MacDock
              isDark={isDark}
              activeMenu={activeMenu}
              setActiveMenu={setActiveMenu}
            />

            <Toast toast={toast} isDark={isDark} />
            <ConfirmDialog dialog={confirmDialog} isDark={isDark} onClose={closeConfirm} />
          </div>
        </div>
      );
    }

    function FiltersPanel({ isDark, filters, setFilters, branches, onApply, onClear, saving }) {
      return (
        <section className={cardClass(isDark) + ' rounded-3xl p-5 sm:p-6 mb-6 slide-up'}>
          <div className="flex flex-col lg:flex-row lg:items-end gap-3">
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3 flex-1">
              <Select
                isDark={isDark}
                label="Branch"
                value={filters.branch}
                onChange={(value) => setFilters(prev => ({ ...prev, branch: value }))}
                options={[
                  { value: '', label: 'All Branch' },
                  ...branches.map(branch => ({ value: branch, label: branch }))
                ]}
              />

              <Input
                isDark={isDark}
                label="Date"
                type="date"
                value={filters.date}
                onChange={(value) => setFilters(prev => ({ ...prev, date: value }))}
              />

              <Select
                isDark={isDark}
                label="Month"
                value={filters.month}
                onChange={(value) => setFilters(prev => ({ ...prev, month: Number(value) }))}
                options={MONTH_NAMES.map((name, index) => ({
                  value: index + 1,
                  label: name,
                }))}
              />

              <Input
                isDark={isDark}
                label="Year"
                type="number"
                value={filters.year}
                onChange={(value) => setFilters(prev => ({ ...prev, year: Number(value) }))}
              />
            </div>

            <div className="flex gap-2 lg:w-64">
              <button onClick={onApply} disabled={saving} className={primaryButtonClass(isDark)}>
                {saving ? 'Loading...' : 'Apply'}
              </button>

              <button onClick={onClear} disabled={saving} className={secondaryButtonClass(isDark)}>
                Clear
              </button>
            </div>
          </div>
        </section>
      );
    }

    function DashboardView({ isDark, overview, dailyTotals, branchSummary, filters }) {
      const summary = overview?.summary || {};
      const maxStudents = Math.max(...dailyTotals.map(item => Number(item.studentsTotal || 0)), 1);
      const maxPaper = Math.max(...dailyTotals.map(item => Number(item.paperTotal || 0)), 1);
      const maxPrinting = Math.max(...dailyTotals.map(item => Number(item.printingTotal || 0)), 1);

      return (
        <section className="space-y-6 slide-up">
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
            <StatCard isDark={isDark} label="Student Records" value={summary.studentRecords || 0} icon="database" />
            <StatCard isDark={isDark} label="Supply Records" value={summary.supplyRecords || 0} icon="database" />
            <StatCard isDark={isDark} label="Active Branches" value={summary.activeBranches || 0} icon="layers" />
            <StatCard isDark={isDark} label="Total Users" value={summary.totalUsers || 0} icon="user" />
          </div>

          <div className={cardClass(isDark) + ' rounded-3xl p-5 sm:p-6'}>
            <div className="flex items-center justify-between gap-3 mb-5">
              <div>
                <h2 className="text-lg font-black">Daily Control Chart</h2>
                <p className={mutedClass(isDark)}>
                  Students, paper, dan printing per tanggal.
                </p>
              </div>
              <span className={badgeClass(isDark)}>
                {MONTH_NAMES[Number(filters.month || 1) - 1]} {filters.year}
              </span>
            </div>

            <div className="overflow-x-auto custom-scroll pb-2">
              <div className="min-w-[980px] h-72 flex items-end gap-2">
                {dailyTotals.map(item => {
                  const studentsHeight = Math.max(8, (Number(item.studentsTotal || 0) / maxStudents) * 210);
                  const paperHeight = Math.max(8, (Number(item.paperTotal || 0) / maxPaper) * 210);
                  const printingHeight = Math.max(8, (Number(item.printingTotal || 0) / maxPrinting) * 210);

                  return (
                    <div key={item.day} className="flex-1 flex flex-col items-center gap-2">
                      <div className="text-[10px] font-black opacity-70">
                        {item.studentsTotal}/{item.paperTotal}/{item.printingTotal}
                      </div>

                      <div className="flex items-end gap-1 h-[220px]">
                        <div className="rounded-t-xl bg-emerald-500/70" style={{ height: `${studentsHeight}px`, width: '9px' }} title="Students"></div>
                        <div className="rounded-t-xl bg-amber-500/70" style={{ height: `${paperHeight}px`, width: '9px' }} title="Paper"></div>
                        <div className="rounded-t-xl bg-blue-500/70" style={{ height: `${printingHeight}px`, width: '9px' }} title="Printing"></div>
                      </div>

                      <div className="text-[10px] opacity-60">{item.day}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="mt-4 flex flex-wrap gap-2 text-xs font-black">
              <span className="px-3 py-2 rounded-full bg-emerald-500/15 text-emerald-500 border border-emerald-500/20">Students</span>
              <span className="px-3 py-2 rounded-full bg-amber-500/15 text-amber-500 border border-amber-500/20">Paper</span>
              <span className="px-3 py-2 rounded-full bg-blue-500/15 text-blue-500 border border-blue-500/20">Printing</span>
            </div>
          </div>

          <div className={cardClass(isDark) + ' rounded-3xl p-5 sm:p-6 overflow-hidden'}>
            <div className="flex items-center gap-3 mb-5">
              <Icon name="layers" className="w-7 h-7" />
              <div>
                <h2 className="text-lg font-black">Branch Summary</h2>
                <p className={mutedClass(isDark)}>Kontrol students, paper, dan printing per branch.</p>
              </div>
            </div>

            <ResponsiveTable
              isDark={isDark}

      const isSuccess = dialog.tone === 'success';

      const iconClass = isDanger
        ? 'bg-red-500/15 text-red-500 border-red-500/20'
        : isSuccess
          ? 'bg-emerald-500/15 text-emerald-500 border-emerald-500/20'
          : isDark
            ? 'bg-white/10 text-white border-white/10'
            : 'bg-slate-950/5 text-slate-950 border-slate-200';

      const confirmClass = isDanger
        ? 'bg-red-500 text-white hover:bg-red-600'
        : isSuccess
          ? 'bg-emerald-500 text-white hover:bg-emerald-600'
          : isDark
            ? 'bg-white text-slate-950 hover:bg-slate-200'
            : 'bg-slate-950 text-white hover:bg-slate-800';

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 py-6">
          <div onClick={onClose} className="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

            <div className={`w-14 h-14 rounded-3xl border flex items-center justify-center mb-5 ${iconClass}`}>
              <Icon name={isDanger ? 'trash' : isSuccess ? 'check' : 'spark'} className="w-7 h-7" />

            <div className="flex gap-3">
              <button onClick={onClose} className={secondaryButtonClass(isDark) + ' flex-1'}>
                {dialog.cancelText}

              <button
                onClick={dialog.onConfirm}
                className={`h-11 px-5 rounded-2xl font-black transition active:scale-[0.98] flex-1 ${confirmClass}`}
              >
                {dialog.confirmText}
              </button>
            </div>
          </div>
        </div>
      );

        empty: (
          <>
            <path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
            <path d="M3.3 7 12 12l8.7-5" />
            <path d="M12 22V12" />
          </>
        ),
      };

      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          {icons[name] || icons.spark}
        </svg>
      );
    }

    function cardClass(isDark) {
      return isDark
        ? 'glass-dark border border-white/10 shadow-2xl shadow-black/20'
        : 'glass-light border border-white shadow-xl shadow-slate-300/40';
    }

    function softBoxClass(isDark) {
      return isDark
        ? 'bg-white/5 border border-white/10'
        : 'bg-slate-950/5 border border-slate-200';
    }

    function mutedClass(isDark) {
      return isDark
        ? 'text-sm text-white/50'
        : 'text-sm text-slate-500';
    }

    function badgeClass(isDark) {
      return isDark
        ? 'inline-flex h-9 items-center px-4 rounded-full bg-white/10 border border-white/10 text-white/80 text-sm font-black'
        : 'inline-flex h-9 items-center px-4 rounded-full bg-slate-950/5 border border-slate-200 text-slate-700 text-sm font-black';
    }

    function inputClass(isDark, disabled = false) {
      if (disabled) {
        return isDark
          ? 'w-full h-11 rounded-2xl bg-white/5 border border-white/10 text-white/40 px-4 outline-none cursor-not-allowed'
          : 'w-full h-11 rounded-2xl bg-slate-100 border border-slate-200 text-slate-400 px-4 outline-none cursor-not-allowed';
      }

      return isDark
        ? 'w-full h-11 rounded-2xl bg-white/10 border border-white/10 text-white placeholder-white/30 px-4 outline-none focus:ring-2 focus:ring-white/30 transition'
        : 'w-full h-11 rounded-2xl bg-white border border-slate-200 text-slate-950 placeholder-slate-400 px-4 outline-none focus:ring-2 focus:ring-slate-300 transition';
    }

    function primaryButtonClass(isDark) {
      return isDark
        ? 'w-full h-11 rounded-2xl bg-white text-slate-950 font-black hover:bg-slate-200 active:scale-[0.98] transition disabled:opacity-60'
        : 'w-full h-11 rounded-2xl bg-slate-950 text-white font-black hover:bg-slate-800 active:scale-[0.98] transition disabled:opacity-60';
    }

    function secondaryButtonClass(isDark) {
      return isDark
        ? 'h-11 px-4 rounded-2xl bg-white/10 border border-white/10 text-white font-black hover:bg-white/15 transition disabled:opacity-60'
        : 'h-11 px-4 rounded-2xl bg-white border border-slate-200 text-slate-700 font-black hover:bg-slate-50 transition disabled:opacity-60';
    }

    function iconButtonClass(isDark) {
      return isDark
        ? 'w-11 h-11 rounded-2xl bg-white/10 border border-white/10 text-white hover:bg-white/15 flex items-center justify-center transition'
        : 'w-11 h-11 rounded-2xl bg-white border border-slate-200 text-slate-950 hover:bg-slate-50 flex items-center justify-center transition';
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
