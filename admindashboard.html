<!DOCTYPE html>
<html lang="en">
<head>
  <base target="_top">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Admin Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --dock-bottom: max(18px, env(safe-area-inset-bottom));
    }

    * {
      -webkit-tap-highlight-color: transparent;
      transition:
        background-color 420ms ease,
        color 420ms ease,
        border-color 420ms ease,
        box-shadow 420ms ease,
        opacity 260ms ease;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .fade-in {
      animation: fadeIn 0.45s ease both;
    }

    .slide-up {
      animation: slideUp 0.5s ease both;
    }

    .dock-pop {
      animation: dockPop 0.45s cubic-bezier(.2,.9,.2,1.2) both;
    }

    .modal-pop {
      animation: modalPop 0.28s cubic-bezier(.2,.9,.2,1.1) both;
    }

    .toast-in {
      animation: toastIn 0.32s ease both;
    }

    .theme-switching {
      pointer-events: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes dockPop {
      from {
        opacity: 0;
        transform: translateY(20px) scale(.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes modalPop {
      from {
        opacity: 0;
        transform: translateY(18px) scale(.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(14px) scale(.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    input, select {
      color-scheme: light;
    }

    .dark input,
    .dark select {
      color-scheme: dark;
    }

    .glass-light {
      background: rgba(255,255,255,.74);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .glass-dark {
      background: rgba(15,23,42,.74);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .dock-glass-light {
      background: rgba(255,255,255,.78);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
    }

    .dock-glass-dark {
      background: rgba(15,23,42,.80);
      backdrop-filter: blur(28px) saturate(1.4);
      -webkit-backdrop-filter: blur(28px) saturate(1.4);
    }

    .custom-scroll::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, .45);
      border-radius: 999px;
    }

    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, .7);
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      .fade-in,
      .slide-up,
      .dock-pop,
      .modal-pop,
      .toast-in {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    /***********************
     * GITHUB FRONTEND CONFIG
     ***********************/
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyklRwZ2w1uUTBBHCypsZnSmLexi-9TBLHr6EmtmE3v0ffJtOZVdEJVUpK4VJQAyzO9/exec';

    const SESSION_KEY = 'gas_auth_token';
    const THEME_KEY = 'admin_dashboard_theme';
    const ATTENDANCE_SETTINGS_KEY = 'admin_attendance_color_settings';

    const MONTH_NAMES = [
      'January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'
    ];

    const DEFAULT_ATTENDANCE_SETTINGS = {
      lowMax: 5,
      mediumMin: 6,
      mediumMax: 7,
      highMin: 8,
    };

    async function runGas(action, ...params) {
      if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL === 'PASTE_YOUR_GAS_WEB_APP_URL_HERE') {
        throw new Error('GAS_WEB_APP_URL belum diatur.');
      }

      const response = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({
          action,
          params,
        }),
      });

      const text = await response.text();

      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error('Response server bukan JSON valid.');
      }
    }

    function App() {
      const today = new Date();

      const [theme, setTheme] = useState(localStorage.getItem(THEME_KEY) || 'dark');
      const [activeMenu, setActiveMenu] = useState('dashboard');

      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [saving, setSaving] = useState(false);

      const [toast, setToast] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);

      const [classes, setClasses] = useState([]);
      const [dailyStudents, setDailyStudents] = useState([]);
      const [matrixDate, setMatrixDate] = useState(new Date().toISOString().slice(0, 10));
      const [matrixRows, setMatrixRows] = useState([]);

      const [recapMonth, setRecapMonth] = useState(today.getMonth() + 1);
      const [recapYear, setRecapYear] = useState(today.getFullYear());
      const [monthlyRecap, setMonthlyRecap] = useState(null);

      const [attendanceSettings, setAttendanceSettings] = useState(() => {
        try {
          const saved = localStorage.getItem(ATTENDANCE_SETTINGS_KEY);
          return saved ? JSON.parse(saved) : DEFAULT_ATTENDANCE_SETTINGS;
        } catch (error) {
          return DEFAULT_ATTENDANCE_SETTINGS;
        }
      });

      const [accessError, setAccessError] = useState('');

      const [classForm, setClassForm] = useState({
        id: '',
        trainerName: '',
        level: '',
        jamSection: '',
        branch: '',
        status: 'Active',
      });

      const [filters, setFilters] = useState({
        date: '',
        month: '',
        year: '',
      });

      const isDark = theme === 'dark';

      useEffect(() => {
        document.documentElement.classList.toggle('dark', isDark);
        localStorage.setItem(THEME_KEY, theme);
      }, [theme]);

      useEffect(() => {
        localStorage.setItem(ATTENDANCE_SETTINGS_KEY, JSON.stringify(attendanceSettings));
      }, [attendanceSettings]);

      useEffect(() => {
        boot();
      }, []);

      function smoothToggleTheme() {
        document.body.classList.add('theme-switching');

        setTheme(prev => prev === 'dark' ? 'light' : 'dark');

        setTimeout(() => {
          document.body.classList.remove('theme-switching');
        }, 450);
      }

      function showToast(type, text) {
        setToast({ type, text });

        setTimeout(() => {
          setToast(null);
        }, 3400);
      }

      function showSuccess(text) {
        showToast('success', text);
      }

      function showError(text) {
        showToast('error', text);
      }

      function openConfirm(config) {
        setConfirmDialog({
          title: config.title || 'Are you sure?',
          message: config.message || 'This action needs confirmation.',
          confirmText: config.confirmText || 'Confirm',
          cancelText: config.cancelText || 'Cancel',
          tone: config.tone || 'danger',
          onConfirm: config.onConfirm,
        });
      }

      function closeConfirm() {
        setConfirmDialog(null);
      }

      async function boot() {
        setLoading(true);
        setAccessError('');

        try {
          const token = localStorage.getItem(SESSION_KEY);

          if (!token) {
            redirectToLogin();
            return;
          }

          const sessionResponse = await runGas('getUserSession', token);

          if (!sessionResponse.success) {
            localStorage.removeItem(SESSION_KEY);
            redirectToLogin();
            return;
          }

          if (sessionResponse.user.role !== 'Admin') {
            setAccessError('Akses ditolak. Halaman ini hanya untuk Admin.');
            setLoading(false);
            return;
          }

          setUser(sessionResponse.user);

          setClassForm(prev => ({
            ...prev,
            branch: sessionResponse.user.branch,
          }));

          await Promise.all([
            loadClasses(token),
            loadDailyStudents(token),
            loadDailyMatrix(token, matrixDate),
            loadMonthlyRecap(token, recapMonth, recapYear),
          ]);

        } catch (err) {
          setAccessError(err.message || 'Gagal memuat dashboard.');
        } finally {
          setLoading(false);
        }
      }

      function redirectToLogin() {
        window.location.href = 'index.html';
      }

      async function loadClasses(tokenParam) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getClassDetails', token);

        if (response.success) {
          setClasses(response.data || []);
        } else {
          showError(response.message || 'Gagal memuat class.');
        }
      }

      async function loadDailyStudents(tokenParam, customFilters) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getDailyStudents', token, customFilters || filters);

        if (response.success) {
          setDailyStudents(response.data || []);
        } else {
          showError(response.message || 'Gagal memuat data murid.');
        }
      }

      async function loadDailyMatrix(tokenParam, dateParam) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getDailyInputMatrix', token, dateParam || matrixDate);

        if (response.success) {
          setMatrixRows(response.data || []);
        } else {
          showError(response.message || 'Gagal memuat matrix input.');
        }
      }

      async function loadMonthlyRecap(tokenParam, monthParam, yearParam) {
        const token = tokenParam || localStorage.getItem(SESSION_KEY);
        const response = await runGas('getMonthlyDashboardRecap', token, Number(monthParam), Number(yearParam));

        if (response.success) {
          setMonthlyRecap(response.data);
        } else {
          showError(response.message || 'Gagal memuat monthly recap.');
        }
      }

      async function handleChangeMatrixDate(value) {
        setMatrixDate(value);
        await loadDailyMatrix(null, value);
      }

      async function handleChangeRecapMonth(value) {
        const month = Number(value);
        setRecapMonth(month);
        await loadMonthlyRecap(null, month, recapYear);
      }

      async function handleChangeRecapYear(value) {
        const year = Number(value);
        setRecapYear(year);
        await loadMonthlyRecap(null, recapMonth, year);
      }

      function updateMatrixValue(index, value) {
        setMatrixRows(prev => {
          const copy = [...prev];

          copy[index] = {
            ...copy[index],
            muridHadir: value,
            isEdited: String(value) !== String(copy[index].originalMuridHadir || ''),
          };

          return copy;
        });
      }

      function confirmSaveAllDaily() {
        const rowsToSave = matrixRows.filter(row => {
          return row.muridHadir !== '' &&
            row.muridHadir !== null &&
            row.muridHadir !== undefined;
        });

        if (!rowsToSave.length) {
          showError('Belum ada data murid yang diisi.');
          return;
        }

        openConfirm({
          title: 'Save all attendance?',
          message: 'Data yang belum ada akan dibuat. Data yang sudah ada di tanggal yang sama akan direvisi tanpa duplicate.',
          confirmText: 'Save All',
          tone: 'success',
          onConfirm: saveAllDaily,
        });
      }

      async function saveAllDaily() {
        closeConfirm();

        const rowsToSave = matrixRows.filter(row => {
          return row.muridHadir !== '' &&
            row.muridHadir !== null &&
            row.muridHadir !== undefined;
        });

        setSaving(true);

        try {
          const token = localStorage.getItem(SESSION_KEY);
          const response = await runGas('saveDailyStudentsBulk', token, matrixDate, rowsToSave);

          if (!response.success) {
            showError(response.message || 'Gagal menyimpan bulk data.');
            return;
          }

          await Promise.all([
            loadDailyMatrix(token, matrixDate),
            loadDailyStudents(token),
            loadMonthlyRecap(token, recapMonth, recapYear),
          ]);

          showSuccess(response.message || 'Data berhasil disimpan.');

        } catch (err) {
          showError(err.message || 'Terjadi error saat menyimpan bulk data.');
        } finally {
          setSaving(false);
        }
      }

      function requestDeleteDaily(id) {
        openConfirm({
          title: 'Delete daily record?',
          message: 'Data murid harian ini akan dihapus dari database. Aksi ini tidak bisa dibatalkan.',
          confirmText: 'Delete',
          tone: 'danger',
          onConfirm: () => deleteDaily(id),
        });
      }

      async function deleteDaily(id) {
        closeConfirm();
        setSaving(true);

        try {
          const token = localStorage.getItem(SESSION_KEY);
          const response = await runGas('deleteDailyStudent', token, id);

          if (!response.success) {
            showError(response.message || 'Gagal menghapus data.');
            return;
          }

          await Promise.all([
            loadDailyStudents(token),
            loadDailyMatrix(token, matrixDate),
            loadMonthlyRecap(token, recapMonth, recapYear),
          ]);

          showSuccess(response.message || 'Data berhasil dihapus.');

        } catch (err) {
          showError(err.message || 'Terjadi error saat menghapus data.');
        } finally {
          setSaving(false);
        }
      }

      async function applyFilters() {
        await loadDailyStudents(null, filters);
      }

      async function clearFilters() {
        const empty = { date: '', month: '', year: '' };
        setFilters(empty);
        await loadDailyStudents(null, empty);
      }

      async function handleSubmitClass(e) {
        e.preventDefault();

        if (!classForm.trainerName || !classForm.level || !classForm.jamSection || !classForm.branch) {
          showError('Trainer Name, Level, Jam/Section, dan Branch wajib diisi.');
          return;
        }

        setSaving(true);

        try {
          const token = localStorage.getItem(SESSION_KEY);

          const payload = {
            trainerName: classForm.trainerName,
            level: classForm.level,
            jamSection: classForm.jamSection,
            branch: classForm.branch,
            status: classForm.status,
          };

          const response = classForm.id
            ? await runGas('updateClassDetail', token, classForm.id, payload)
            : await runGas('createClassDetail', token, payload);

          if (!response.success) {
            showError(response.message || 'Gagal menyimpan class.');
            return;
          }

          resetClassForm();

          await Promise.all([
            loadClasses(token),
            loadDailyMatrix(token, matrixDate),
            loadMonthlyRecap(token, recapMonth, recapYear),
          ]);

          showSuccess(response.message || 'Class berhasil disimpan.');

        } catch (err) {
          showError(err.message || 'Terjadi error saat menyimpan class.');
        } finally {
          setSaving(false);
        }
      }

      function editClass(item) {
        setClassForm({
          id: item.ID,
          trainerName: item['Trainer Name'],
          level: item.Level,
          jamSection: item['Jam/Section'],
          branch: item.Branch,
          status: item.Status || 'Active',
        });

        setActiveMenu('classes');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function requestDeleteClass(id) {
        openConfirm({
          title: 'Delete class?',
          message: 'Class ini akan dihapus dari ClassDetails. Pastikan tidak sedang digunakan untuk input aktif.',
          confirmText: 'Delete',
          tone: 'danger',
          onConfirm: () => deleteClass(id),
        });
      }

      async function deleteClass(id) {
        closeConfirm();
        setSaving(true);

        try {
          const token = localStorage.getItem(SESSION_KEY);
          const response = await runGas('deleteClassDetail', token, id);

          if (!response.success) {
            showError(response.message || 'Gagal menghapus class.');
            return;
          }

          await Promise.all([
            loadClasses(token),
            loadDailyMatrix(token, matrixDate),
            loadMonthlyRecap(token, recapMonth, recapYear),
          ]);

          showSuccess(response.message || 'Class berhasil dihapus.');

        } catch (err) {
          showError(err.message || 'Terjadi error saat menghapus class.');
        } finally {
          setSaving(false);
        }
      }

      function resetClassForm() {
        setClassForm({
          id: '',
          trainerName: '',
          level: '',
          jamSection: '',
          branch: user?.branch || '',
          status: 'Active',
        });
      }

      function saveSettings(newSettings) {
        setAttendanceSettings(newSettings);
        showSuccess('Settings warna attendance berhasil disimpan.');
      }

      function resetSettings() {
        setAttendanceSettings(DEFAULT_ATTENDANCE_SETTINGS);
        showSuccess('Settings dikembalikan ke default.');
      }

      function requestLogout() {
        openConfirm({
          title: 'Logout from dashboard?',
          message: 'Session kamu akan diakhiri dan kamu akan kembali ke halaman login.',
          confirmText: 'Logout',
          tone: 'neutral',
          onConfirm: handleLogout,
        });
      }

      async function handleLogout() {
        closeConfirm();

        try {
          const token = localStorage.getItem(SESSION_KEY);
          await runGas('logoutUser', token);
        } catch (err) {
          console.error(err);
        } finally {
          localStorage.removeItem(SESSION_KEY);
          redirectToLogin();
        }
      }

      const stats = useMemo(() => {
        const totalStudents = dailyStudents.reduce((sum, item) => {
          return sum + Number(item['Murid Hadir'] || 0);
        }, 0);

        const filledMatrix = matrixRows.filter(row => row.muridHadir !== '' && row.muridHadir !== null && row.muridHadir !== undefined).length;
        const savedMatrix = matrixRows.filter(row => row.isSaved).length;

        return {
          totalClasses: classes.length,
          activeClasses: classes.filter(item => item.Status === 'Active').length,
          totalReports: dailyStudents.length,
          totalStudents,
          filledMatrix,
          savedMatrix,
        };
      }, [classes, dailyStudents, matrixRows]);

      const pageClass = isDark
        ? 'dark min-h-screen bg-[#020617] text-white'
        : 'min-h-screen bg-slate-100 text-slate-950';

      if (loading) {
        return (
          <div className={pageClass}>
            <div className="min-h-screen flex items-center justify-center px-4">
              <div className="text-center fade-in">
                <div className={`w-12 h-12 border-4 rounded-full animate-spin mx-auto mb-4 ${
                  isDark ? 'border-white/20 border-t-white' : 'border-slate-300 border-t-slate-950'
                }`}></div>
                <p className={isDark ? 'text-white/70 text-sm' : 'text-slate-500 text-sm'}>
                  Loading Admin Dashboard...
                </p>
              </div>
            </div>
          </div>
        );
      }

      if (accessError && !user) {
        return (
          <div className={pageClass}>
            <div className="min-h-screen flex items-center justify-center px-4">
              <div className={cardClass(isDark) + ' max-w-md w-full rounded-3xl p-6 text-center'}>
                <h1 className="text-xl font-black mb-2">Access Error</h1>
                <p className="text-red-500 text-sm mb-5">{accessError}</p>
                <button
                  onClick={handleLogout}
                  className={primaryButtonClass(isDark)}
                >
                  Back to Login
                </button>
              </div>
            </div>
          </div>
        );
      }

      return (
        <div className={pageClass}>
          <BackgroundGlow isDark={isDark} />

          <div className="relative min-h-screen pb-32">
            <Header
              user={user}
              isDark={isDark}
              theme={theme}
              onToggleTheme={smoothToggleTheme}
              onLogout={requestLogout}
            />

            <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8">
              <section className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4 mb-6 slide-up">
                <StatCard isDark={isDark} label="Active Class" value={stats.activeClasses} icon="layers" />
                <StatCard isDark={isDark} label="Filled Today" value={stats.filledMatrix} icon="edit" />
                <StatCard isDark={isDark} label="Saved Today" value={stats.savedMatrix} icon="check" />
                <StatCard isDark={isDark} label="Murid Hadir" value={stats.totalStudents} icon="users" />
              </section>

              {activeMenu === 'dashboard' && (
                <DashboardView
                  isDark={isDark}
                  recapMonth={recapMonth}
                  recapYear={recapYear}
                  monthlyRecap={monthlyRecap}
                  attendanceSettings={attendanceSettings}
                  onChangeMonth={handleChangeRecapMonth}
                  onChangeYear={handleChangeRecapYear}
                />
              )}

              {activeMenu === 'daily' && (
                <DailyInputView
                  isDark={isDark}
                  matrixDate={matrixDate}
                  matrixRows={matrixRows}
                  saving={saving}
                  attendanceSettings={attendanceSettings}
                  onChangeDate={handleChangeMatrixDate}
                  onChangeValue={updateMatrixValue}
                  onSaveAll={confirmSaveAllDaily}
                />
              )}

              {activeMenu === 'records' && (
                <RecordsView
                  isDark={isDark}
                  dailyStudents={dailyStudents}
                  filters={filters}
                  setFilters={setFilters}
                  applyFilters={applyFilters}
                  clearFilters={clearFilters}
                  deleteDaily={requestDeleteDaily}
                  attendanceSettings={attendanceSettings}
                />
              )}

              {activeMenu === 'classes' && (
                <ClassesView
                  isDark={isDark}
                  classForm={classForm}
                  setClassForm={setClassForm}
                  classes={classes}
                  saving={saving}
                  onSubmit={handleSubmitClass}
                  onReset={resetClassForm}
                  onEdit={editClass}
                  onDelete={requestDeleteClass}
                />
              )}

              {activeMenu === 'settings' && (
                <SettingsView
                  isDark={isDark}
                  settings={attendanceSettings}
                  onSave={saveSettings}
                  onReset={resetSettings}
                />
              )}

              {activeMenu === 'profile' && (
                <ProfileView isDark={isDark} user={user} />
              )}
            </main>

            <MacDock
              isDark={isDark}
              activeMenu={activeMenu}
              setActiveMenu={setActiveMenu}
            />

            <Toast toast={toast} isDark={isDark} />
            <ConfirmDialog dialog={confirmDialog} isDark={isDark} onClose={closeConfirm} />
          </div>
        </div>
      );
    }

    function DashboardView({ isDark, recapMonth, recapYear, monthlyRecap, attendanceSettings, onChangeMonth, onChangeYear }) {
      const summary = monthlyRecap?.summary || {};
      const dailyTotals = monthlyRecap?.dailyTotals || [];
      const classes = monthlyRecap?.classes || [];
      const daysInMonth = monthlyRecap?.daysInMonth || 31;

      const maxTotal = Math.max(...dailyTotals.map(item => Number(item.total || 0)), 1);

      return (
        <section className="space-y-6 slide-up">
          <div className={cardClass(isDark) + ' rounded-3xl p-5 sm:p-6'}>
            <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
              <div className="flex items-center gap-3">
                <Icon name="chart" className="w-8 h-8" />
                <div>
                  <h2 className="text-xl font-black">Monthly Dashboard</h2>
                  <p className={mutedClass(isDark)}>
                    Recap murid hadir semua class per tanggal.
                  </p>
                </div>
              </div>

              <div className="grid grid-cols-2 gap-3 w-full lg:w-auto">
                <Select
                  isDark={isDark}
                  label="Month"
                  value={recapMonth}
                  onChange={onChangeMonth}
                  options={MONTH_NAMES.map((name, index) => ({
                    value: index + 1,
                    label: name,
                  }))}
                />

                <Input
                  isDark={isDark}
                  label="Year"
                  type="number"
                  value={recapYear}
                  onChange={onChangeYear}
                />
              </div>

      function submit(e) {
        e.preventDefault();

        const clean = {
          lowMax: Number(form.lowMax),
          mediumMin: Number(form.mediumMin),
          mediumMax: Number(form.mediumMax),
          highMin: Number(form.highMin),
        };

        if (
          isNaN(clean.lowMax) ||
          isNaN(clean.mediumMin) ||
          isNaN(clean.mediumMax) ||
          isNaN(clean.highMin)
        ) {
          return;
        }

        onSave(clean);

                value={form.lowMax}
                onChange={(value) => setForm(prev => ({ ...prev, lowMax: value }))}

                onChange={(value) => setForm(prev => ({ ...prev, mediumMax: value }))}

          <label className={isDark ? 'block text-sm text-white/60 mb-2' : 'block text-sm text-slate-500 mb-2'}>
            {label}
          </label>
          <select
            value={value}
            onChange={(e) => onChange(e.target.value)}
            className={inputClass(isDark)}
          >
            {options.map(option => (
              <option key={option.value} value={option.value} className={isDark ? 'bg-slate-900' : 'bg-white'}>
                {option.label}
              </option>
            ))}
          </select>
        </div>
      );
    }

    function ResponsiveTable({ isDark, headers, rows, emptyText, maxHeight = '60vh' }) {
      if (!rows.length) {
        return <EmptyState isDark={isDark} text={emptyText} />;
      }

      return (
        <div className="overflow-hidden rounded-2xl">
          <div className="overflow-auto custom-scroll" style={{ maxHeight }}>
            <table className="w-full min-w-[780px] text-sm">
              <thead className={isDark ? 'sticky top-0 z-10 bg-slate-900/95 backdrop-blur-xl' : 'sticky top-0 z-10 bg-white/95 backdrop-blur-xl'}>
                <tr className={isDark ? 'text-left text-white/45 border-b border-white/10' : 'text-left text-slate-500 border-b border-slate-200'}>
                  {headers.map(header => (
                    <th key={header} className="py-3 pr-4 font-bold first:pl-1">
                      {header}
                    </th>
                  ))}
                </tr>
              </thead>

              <tbody>
                {rows.map((row, rowIndex) => (
                  <tr key={rowIndex} className={isDark ? 'border-b border-white/5' : 'border-b border-slate-100'}>
                    {row.map((cell, cellIndex) => (
                      <td key={cellIndex} className="py-3 pr-4 first:pl-1">
                        {cell || '-'}
                      </td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function ConfirmDialog({ dialog, isDark, onClose }) {
      if (!dialog) return null;

      const isDanger = dialog.tone === 'danger';
      const isSuccess = dialog.tone === 'success';

      const iconClass = isDanger
        ? 'bg-red-500/15 text-red-500 border-red-500/20'
        : isSuccess
          ? 'bg-emerald-500/15 text-emerald-500 border-emerald-500/20'
          : isDark
            ? 'bg-white/10 text-white border-white/10'
            : 'bg-slate-950/5 text-slate-950 border-slate-200';

      const confirmClass = isDanger
        ? 'bg-red-500 text-white hover:bg-red-600'
        : isSuccess
          ? 'bg-emerald-500 text-white hover:bg-emerald-600'
          : isDark
            ? 'bg-white text-slate-950 hover:bg-slate-200'
            : 'bg-slate-950 text-white hover:bg-slate-800';

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center px-4 py-6">
          <div onClick={onClose} className="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

          <div className={cardClass(isDark) + ' relative w-full max-w-md rounded-[2rem] p-6 modal-pop'}>
            <div className={`w-14 h-14 rounded-3xl border flex items-center justify-center mb-5 ${iconClass}`}>
              <Icon name={isDanger ? 'trash' : isSuccess ? 'check' : 'spark'} className="w-7 h-7" />
            </div>

            <h3 className="text-xl font-black mb-2">{dialog.title}</h3>
            <p className={mutedClass(isDark) + ' leading-relaxed mb-6'}>{dialog.message}</p>

            <div className="flex gap-3">
              <button onClick={onClose} className={secondaryButtonClass(isDark) + ' flex-1'}>
                {dialog.cancelText}
              </button>

              <button
                onClick={dialog.onConfirm}
                className={`h-11 px-5 rounded-2xl font-black transition active:scale-[0.98] flex-1 ${confirmClass}`}
              >
                {dialog.confirmText}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function Toast({ toast, isDark }) {
      if (!toast) return null;

      const isSuccess = toast.type === 'success';

      const boxClass = isSuccess
        ? isDark
          ? 'bg-emerald-500/15 text-emerald-100 border-emerald-400/20'
          : 'bg-emerald-50 text-emerald-700 border-emerald-200'
        : isDark
          ? 'bg-red-500/15 text-red-100 border-red-400/20'
          : 'bg-red-50 text-red-700 border-red-200';

      return (
        <div className="fixed left-4 right-4 bottom-32 z-50 flex justify-center pointer-events-none">
          <div className={`toast-in pointer-events-auto max-w-md w-full rounded-3xl border px-4 py-4 shadow-2xl backdrop-blur-xl ${boxClass}`}>
            <div className="flex items-start gap-3">
              <div className="mt-0.5">
                <Icon name={isSuccess ? 'check' : 'alert'} className="w-5 h-5" />
              </div>
              <p className="text-sm font-bold leading-relaxed">{toast.text}</p>
            </div>
          </div>
        </div>
      );
    }

    function StatusPill({ row }) {
      let text = 'New';
      let cls = 'bg-blue-500/15 text-blue-500 border-blue-500/20';

      if (row.isSaved && row.isEdited) {
        text = 'Edited';
        cls = 'bg-amber-500/15 text-amber-500 border-amber-500/20';
      } else if (row.isSaved) {
        text = 'Saved';
        cls = 'bg-emerald-500/15 text-emerald-500 border-emerald-500/20';
      }

      return (
        <span className={`inline-flex h-8 items-center px-3 rounded-full border text-xs font-black ${cls}`}>
          {text}
        </span>
      );
    }

    function AttendanceLegend({ settings }) {
      return (
        <div className="flex flex-wrap gap-2 text-xs font-black">
          <span className="px-3 py-2 rounded-full bg-red-500/15 text-red-500 border border-red-500/20">≤ {settings.lowMax}</span>
          <span className="px-3 py-2 rounded-full bg-amber-500/15 text-amber-500 border border-amber-500/20">{settings.mediumMin}-{settings.mediumMax}</span>
          <span className="px-3 py-2 rounded-full bg-emerald-500/15 text-emerald-500 border border-emerald-500/20">≥ {settings.highMin}</span>
        </div>
      );
    }

    function PreviewColor({ label, value, className }) {
      return (
        <div className={`rounded-3xl border p-5 ${className}`}>
          <p className="text-sm font-black">{label}</p>
          <h3 className="text-4xl font-black mt-2">{value}</h3>
        </div>
      );
    }

    function EmptyState({ isDark, text }) {
      return (
        <div className={softBoxClass(isDark) + ' rounded-3xl p-8 text-center'}>
          <div className="mx-auto w-14 h-14 rounded-3xl flex items-center justify-center mb-4 bg-slate-500/10">
            <Icon name="empty" className="w-7 h-7 opacity-60" />
          </div>
          <p className={mutedClass(isDark)}>{text}</p>
        </div>
      );
    }

    function InfoBox({ isDark, label, value }) {
      return (
        <div className={softBoxClass(isDark) + ' rounded-2xl p-4'}>
          <p className={mutedClass(isDark)}>{label}</p>
          <p className="font-black mt-1">{value || '-'}</p>
        </div>
      );
    }

    function BackgroundGlow({ isDark }) {
      return (
        <div className="fixed inset-0 pointer-events-none overflow-hidden">
          <div className={`absolute -top-24 -left-24 w-72 h-72 rounded-full blur-3xl ${isDark ? 'bg-blue-500/20' : 'bg-blue-300/40'}`}></div>
          <div className={`absolute top-1/3 -right-24 w-80 h-80 rounded-full blur-3xl ${isDark ? 'bg-emerald-500/10' : 'bg-emerald-300/35'}`}></div>
          <div className={`absolute -bottom-32 left-1/3 w-80 h-80 rounded-full blur-3xl ${isDark ? 'bg-purple-500/10' : 'bg-purple-300/30'}`}></div>
        </div>
      );
    }

    function getAttendanceColorClass(value, settings, type) {
      if (value === '' || value === null || value === undefined) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-slate-400/20'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black';
      }

      const number = Number(value);

      if (isNaN(number)) {
        return 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black';
      }

      if (number <= Number(settings.lowMax)) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-red-500/70'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-red-500/15 text-red-500 border border-red-500/20 font-black';
      }

      if (number >= Number(settings.mediumMin) && number <= Number(settings.mediumMax)) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-amber-500/70'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-amber-500/15 text-amber-500 border border-amber-500/20 font-black';
      }

      if (number >= Number(settings.highMin)) {
        return type === 'bar'
          ? 'w-full rounded-t-xl bg-emerald-500/70'
          : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-emerald-500/15 text-emerald-500 border border-emerald-500/20 font-black';
      }

      return type === 'bar'
        ? 'w-full rounded-t-xl bg-slate-400/40'
        : 'inline-flex min-w-8 h-8 items-center justify-center rounded-xl px-2 bg-slate-500/10 text-slate-400 border border-slate-500/10 font-black';
    }

    function Icon({ name, className = 'w-5 h-5' }) {
      const icons = {
        chart: (
          <>
            <path d="M3 3v18h18" />
            <path d="M7 16V9" />
            <path d="M12 16V5" />
            <path d="M17 16v-3" />
          </>
        ),
        edit: (
          <path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" />
        ),
        database: (
          <>
            <ellipse cx="12" cy="5" rx="8" ry="3" />
            <path d="M4 5v6c0 1.7 3.6 3 8 3s8-1.3 8-3V5" />
            <path d="M4 11v6c0 1.7 3.6 3 8 3s8-1.3 8-3v-6" />
          </>
        ),
        layers: (
          <>
            <path d="M12 3 3 8l9 5 9-5-9-5Z" />
            <path d="m3 13 9 5 9-5" />
            <path d="m3 18 9 5 9-5" />
          </>
        ),
        settings: (
          <>
            <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z" />
            <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.87l-.06-.06A2 2 0 1 1 7.03 3.84l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .4-1.1V3a2 2 0 1 1 4 0v.09A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.18.36.5.72 1 .9.33.12.7.1 1.1.1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.51 1Z" />
          </>
        ),
        user: (
          <>
            <path d="M20 21a8 8 0 0 0-16 0" />
            <circle cx="12" cy="7" r="4" />
          </>
        ),
        calendar: (
          <>
            <path d="M8 2v4M16 2v4M3 10h18" />
            <rect x="3" y="4" width="18" height="18" rx="3" />
          </>
        ),
        check: (
          <path d="m20 6-11 11-5-5" />
        ),
        alert: (
          <>
            <path d="M12 9v4" />
            <path d="M12 17h.01" />
            <path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z" />
          </>
        ),
        trash: (
          <>
            <path d="M3 6h18" />
            <path d="M8 6V4h8v2" />
            <path d="M19 6l-1 14H6L5 6" />
            <path d="M10 11v6" />
            <path d="M14 11v6" />
          </>
        ),
        users: (
          <>
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </>
        ),
        sun: (
          <>
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
          </>
        ),
        moon: (
          <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z" />
        ),
        logout: (
          <>
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <path d="M16 17l5-5-5-5" />
            <path d="M21 12H9" />
          </>
        ),
        spark: (
          <path d="M12 2 9.5 9.5 2 12l7.5 2.5L12 22l2.5-7.5L22 12l-7.5-2.5L12 2Z" />
        ),
        empty: (
          <>
            <path d="M21 16V8a2 2 0 0 0-1-1.73L13 2.27a2 2 0 0 0-2 0L4 6.27A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
            <path d="M3.3 7 12 12l8.7-5" />
            <path d="M12 22V12" />
          </>
        ),
      };

      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          {icons[name] || icons.spark}
        </svg>
      );
    }

    function cardClass(isDark) {
      return isDark
        ? 'glass-dark border border-white/10 shadow-2xl shadow-black/20'
        : 'glass-light border border-white shadow-xl shadow-slate-300/40';
    }

    function softBoxClass(isDark) {
      return isDark
        ? 'bg-white/5 border border-white/10'
        : 'bg-slate-950/5 border border-slate-200';
    }

    function mutedClass(isDark) {
      return isDark
        ? 'text-sm text-white/50'
        : 'text-sm text-slate-500';
    }

    function badgeClass(isDark) {
      return isDark
        ? 'inline-flex h-9 items-center px-4 rounded-full bg-white/10 border border-white/10 text-white/80 text-sm font-black'
        : 'inline-flex h-9 items-center px-4 rounded-full bg-slate-950/5 border border-slate-200 text-slate-700 text-sm font-black';
    }

    function inputClass(isDark, disabled = false) {
      if (disabled) {
        return isDark
          ? 'w-full h-11 rounded-2xl bg-white/5 border border-white/10 text-white/40 px-4 outline-none cursor-not-allowed'
          : 'w-full h-11 rounded-2xl bg-slate-100 border border-slate-200 text-slate-400 px-4 outline-none cursor-not-allowed';
      }

      return isDark
        ? 'w-full h-11 rounded-2xl bg-white/10 border border-white/10 text-white placeholder-white/30 px-4 outline-none focus:ring-2 focus:ring-white/30 transition'
        : 'w-full h-11 rounded-2xl bg-white border border-slate-200 text-slate-950 placeholder-slate-400 px-4 outline-none focus:ring-2 focus:ring-slate-300 transition';
    }

    function primaryButtonClass(isDark) {
      return isDark
        ? 'w-full h-11 rounded-2xl bg-white text-slate-950 font-black hover:bg-slate-200 active:scale-[0.98] transition disabled:opacity-60'
        : 'w-full h-11 rounded-2xl bg-slate-950 text-white font-black hover:bg-slate-800 active:scale-[0.98] transition disabled:opacity-60';
    }

    function secondaryButtonClass(isDark) {
      return isDark
        ? 'h-11 px-4 rounded-2xl bg-white/10 border border-white/10 text-white font-black hover:bg-white/15 transition'
        : 'h-11 px-4 rounded-2xl bg-white border border-slate-200 text-slate-700 font-black hover:bg-slate-50 transition';
    }

    function iconButtonClass(isDark) {
      return isDark
        ? 'w-11 h-11 rounded-2xl bg-white/10 border border-white/10 text-white hover:bg-white/15 flex items-center justify-center transition'
        : 'w-11 h-11 rounded-2xl bg-white border border-slate-200 text-slate-950 hover:bg-slate-50 flex items-center justify-center transition';
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
